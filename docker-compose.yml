services:
  nginx:
    image: nginx:alpine
    ports:
      - "21026:21026"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - screeps
    restart: unless-stopped

  screeps:
    image: screeps-private-server:latest
    depends_on:
      - mongo
      - redis
    ports:
      - 21025:21025/tcp
    volumes:
      - ./config.yml:/screeps/config.yml.template:ro
      - screeps-user:/home/node
      - screeps-data:/data
      - screeps-mods:/screeps/mods
    environment:
      MONGO_HOST: mongo
      REDIS_HOST: redis
      STEAM_KEY: ${STEAM_KEY:?"Missing steam key"}
      STATS_KEY: ${STATS_KEY:?"Missing stats key"}
    restart: unless-stopped
    build:
      context: .
      dockerfile: server/Dockerfile

  mongo:
    image: mongo:4.4.30
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  screeps-data:
  screeps-mods:
  screeps-user:
  redis-data:
  mongo-data:


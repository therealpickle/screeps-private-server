serverConfig:
  welcomeText: '<html><h1>Welcome to the Screeps Synergy Nexus™</h1><p>We are <em>thrilled</em> to onboard you into our best-in-class, fully scalable, creep-driven execution environment. This platform represents a paradigm shift in how we leverage distributed unit automation to unlock holistic value across the entire room ecosystem.</p><p>As a valued stakeholder in our creep-centric methodology, we encourage you to ideate boldly, iterate rapidly, and synergize your spawn pipeline with the broader organizational vision. Remember: every harvester is an opportunity to move the needle, and every tower is a chance to circle back on our defensive KPIs.</p><p>We ask that you remain agile in your approach, keeping your energy matrix aligned with our north star of operational excellence. Together, we will disrupt the metagame, drive creep engagement to the next level, and deliver shareholder value — one tick at a time.</p><p><em>Let''s get out there and make impact happen.</em></p></html>'

serverStats:
  rawExports: true
  secret_key: "${STATS_KEY}"

launcherOptions:
  # If set, automatically ensures all mods are updated
  autoUpdate: false
  # If set, forward console messages to terminal
  logConsole: false

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screeps Visualizer</title>
<link rel="stylesheet" href="/visualizer/visualizer.css">
</head>
<body>

<div id="header">
    <h1>Screeps Visualizer</h1>
    <select id="room-select"><option value="">loading rooms...</option></select>
    <div id="status">tick: <span id="tick">--</span> &nbsp; room: <span id="room-label">--</span></div>
</div>

<div id="canvas-wrap">
    <div id="map-wrap">
        <div id="left-col">
            <div id="minimap-wrap">
                <div id="minimap-label">world</div>
                <canvas id="minimap" width="1" height="1"></canvas>
            </div>
            <div id="room-info"></div>
        </div>
        <button class="nav-arrow" id="nav-N" disabled>▲</button>
        <button class="nav-arrow" id="nav-S" disabled>▼</button>
        <button class="nav-arrow" id="nav-W" disabled>◀</button>
        <button class="nav-arrow" id="nav-E" disabled>▶</button>
        <button class="zoom-btn" id="zoom-in"  title="Increase tile size">+</button>
        <button class="zoom-btn" id="zoom-out" title="Decrease tile size">−</button>
        <button class="zoom-btn" id="vz-in"    title="Zoom in">z+</button>
        <button class="zoom-btn" id="vz-out"   title="Zoom out" disabled>z−</button>
        <div id="layers">
            <canvas id="terrain-canvas" width="600" height="600"></canvas>
            <canvas id="objects-canvas" width="600" height="600"></canvas>
        </div>
    </div>
    <div id="stats-panel">
        <div id="stats-owner">no owner</div>
    </div>
</div>

<div id="tooltip"></div>
<div id="body-tooltip"></div>
<div id="error"></div>

<div id="console-panel">
    <div id="console-header">
        <span id="console-label">console</span>
        <span id="console-status"></span>
        <button id="console-clear">clear</button>
        <button id="console-toggle">▼</button>
    </div>
    <div id="console-body"></div>
</div>

<script>
let TILE = 12;
const SIZE = 50;
const MIN_TILE = 4, MAX_TILE = 24, ZOOM_STEP = 2;

const terrainCanvas = document.getElementById('terrain-canvas');
const objectsCanvas = document.getElementById('objects-canvas');
const tCtx = terrainCanvas.getContext('2d');
const oCtx = objectsCanvas.getContext('2d');
const roomSelect = document.getElementById('room-select');
const tickEl = document.getElementById('tick');
const roomLabel = document.getElementById('room-label');
const tooltip = document.getElementById('tooltip');
const errorEl = document.getElementById('error');
const statsPanel = document.getElementById('stats-panel');
const statsOwner = document.getElementById('stats-owner');

// ---- Colors ----

const TERRAIN_COLOR = [
    '#2b2b2b',  // 0: plain
    '#141414',  // 1: wall
    '#0d1a0d',  // 2: swamp
    '#141414',  // 3: wall+swamp (treat as wall)
];

const STRUCT = {
    spawn:          { color: '#00ccff', size: 10 },
    extension:      { color: '#0077bb', size: 7  },
    tower:          { color: '#cc3333', size: 9  },
    storage:        { color: '#cc8800', size: 10 },
    container:      { color: '#886633', size: 8  },
    link:           { color: '#008888', size: 7  },
    lab:            { color: '#880088', size: 9  },
    terminal:       { color: '#888800', size: 10 },
    nuker:          { color: '#cc0000', size: 10 },
    observer:       { color: '#446644', size: 6  },
    powerSpawn:     { color: '#cc4400', size: 10 },
    extractor:      { color: '#884488', size: 9  },
    constructedWall:{ color: '#444444', size: 11 },
    rampart:        { color: '#006600', size: 11, alpha: 0.4 },
    road:           null,
};

const CREEP_COLORS = {
    own:     '#00ff88',
    hostile: '#ff4444',
    npc:     '#ffaa00',
};

const STAT_META = [
    { key: 'energyHarvested',   label: 'harvested',    color: '#4a8a4a' },
    { key: 'energyControl',     label: 'upgraded',     color: '#6644aa' },
    { key: 'energyCreeps',      label: 'spawned',      color: '#2266aa' },
    { key: 'energyConstruction',label: 'built',        color: '#886633' },
    { key: 'creepsProduced',    label: 'creeps born',  color: '#448844' },
    { key: 'creepsLost',        label: 'creeps lost',  color: '#884444' },
];

// ---- State ----
let currentRoom = null;
let pollTimer = null;
let statsTimer = null;
let objectsCache = [];
let terrainCache = null;
let allRooms = [];
let statsOwnerName = null;
let mapStatsCache = {};
let mapUsersCache = {};
let minimapMeta = null; // { minX, maxY, CELL, GAP }
const badgeCache = {}; // username -> Image | 'loading' | 'error'
const VIEW_ZOOM_STEPS = [1, 1.5, 2, 3, 4, 6, 8];
let viewZoomIdx = 0;
let viewZoom = 1;
let viewOffsetX = 0, viewOffsetY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panBaseX = 0, panBaseY = 0;

// ---- Navigation ----
const NAV_DIRS = { N: 'N', S: 'S', E: 'E', W: 'W' };

function adjacentRoom(name, dir) {
    const m = name.match(/^([EW])(\d+)([NS])(\d+)$/);
    if (!m) return null;
    let ew = m[1], ex = parseInt(m[2]), ns = m[3], ny = parseInt(m[4]);
    switch (dir) {
        case 'N':
            if (ns === 'N') ny++;
            else if (ny > 0) ny--;
            else { ns = 'N'; ny = 0; }
            break;
        case 'S':
            if (ns === 'S') ny++;
            else if (ny > 0) ny--;
            else { ns = 'S'; ny = 0; }
            break;
        case 'E':
            if (ew === 'E') ex++;
            else if (ex > 0) ex--;
            else { ew = 'E'; ex = 0; }
            break;
        case 'W':
            if (ew === 'W') ex++;
            else if (ex > 0) ex--;
            else { ew = 'W'; ex = 0; }
            break;
    }
    return `${ew}${ex}${ns}${ny}`;
}

function updateNavArrows(room) {
    for (const dir of ['N', 'S', 'E', 'W']) {
        const btn = document.getElementById('nav-' + dir);
        const neighbor = adjacentRoom(room, dir);
        const exists = neighbor && allRooms.includes(neighbor);
        btn.disabled = !exists;
        btn.title = exists ? neighbor : '';
        btn.onclick = exists ? () => navigateTo(neighbor) : null;
    }
}

function navigateTo(room) {
    roomSelect.value = room;
    history.replaceState(null, '', '?room=' + room);
    selectRoom(room);
}

// ---- Zoom ----
function applyZoom(newTile) {
    TILE = Math.max(MIN_TILE, Math.min(MAX_TILE, newTile));
    const canvasSize = TILE * SIZE;

    terrainCanvas.width  = objectsCanvas.width  = canvasSize;
    terrainCanvas.height = objectsCanvas.height = canvasSize;

    const layers = document.getElementById('layers');
    layers.style.width  = canvasSize + 'px';
    layers.style.height = canvasSize + 'px';

    const mapWrap = document.getElementById('map-wrap');
    mapWrap.style.gridTemplateColumns = `200px auto ${canvasSize}px auto`;
    mapWrap.style.gridTemplateRows    = `auto ${canvasSize}px auto`;

    document.getElementById('zoom-in').disabled  = TILE >= MAX_TILE;
    document.getElementById('zoom-out').disabled = TILE <= MIN_TILE;
    document.getElementById('vz-in').disabled    = viewZoomIdx >= VIEW_ZOOM_STEPS.length - 1;
    document.getElementById('vz-out').disabled   = viewZoomIdx <= 0;

    if (terrainCache) renderTerrain(terrainCache);
    renderObjects();
}

document.getElementById('zoom-in').addEventListener('click', () => applyZoom(TILE + ZOOM_STEP));
document.getElementById('zoom-out').addEventListener('click', () => applyZoom(TILE - ZOOM_STEP));

// ---- View Zoom (viewport, mouse wheel) ----
function clampViewOffset() {
    const visible = SIZE / viewZoom;
    viewOffsetX = Math.max(0, Math.min(SIZE - visible, viewOffsetX));
    viewOffsetY = Math.max(0, Math.min(SIZE - visible, viewOffsetY));
}

function applyViewZoom(newIdx, pivotMx, pivotMy) {
    // pivotMx/My are in canvas-native pixels; zoom toward that point
    const oldZoom = viewZoom;
    viewZoomIdx = Math.max(0, Math.min(VIEW_ZOOM_STEPS.length - 1, newIdx));
    viewZoom = VIEW_ZOOM_STEPS[viewZoomIdx];

    if (pivotMx !== undefined) {
        const tileX = pivotMx / (TILE * oldZoom) + viewOffsetX;
        const tileY = pivotMy / (TILE * oldZoom) + viewOffsetY;
        viewOffsetX = tileX - pivotMx / (TILE * viewZoom);
        viewOffsetY = tileY - pivotMy / (TILE * viewZoom);
    }
    clampViewOffset();
    objectsCanvas.style.cursor = viewZoom > 1 ? 'grab' : 'crosshair';
    document.getElementById('vz-in').disabled  = viewZoomIdx >= VIEW_ZOOM_STEPS.length - 1;
    document.getElementById('vz-out').disabled = viewZoomIdx <= 0;
    if (terrainCache) renderTerrain(terrainCache);
    renderObjects();
}

document.getElementById('vz-in').addEventListener('click',  () => applyViewZoom(viewZoomIdx + 1));
document.getElementById('vz-out').addEventListener('click', () => applyViewZoom(viewZoomIdx - 1));

objectsCanvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    const rect = objectsCanvas.getBoundingClientRect();
    const scale = objectsCanvas.width / rect.width;
    const mx = (e.clientX - rect.left) * scale;
    const my = (e.clientY - rect.top)  * scale;
    applyViewZoom(viewZoomIdx + (e.deltaY < 0 ? 1 : -1), mx, my);
}, { passive: false });

// ---- Init ----
async function init() {
    try {
        const res = await fetch('/visualizer/api/rooms');
        const data = await res.json();
        if (!data.ok || !data.rooms.length) {
            showError('No rooms found');
            return;
        }
        allRooms = data.rooms;
        roomSelect.innerHTML = data.rooms.map(r =>
            `<option value="${r}">${r}</option>`
        ).join('');
        const initial = new URLSearchParams(location.search).get('room');
        const room = (initial && data.rooms.includes(initial)) ? initial : data.rooms[0];
        roomSelect.value = room;
        await fetchMapStats();
        selectRoom(room);
    } catch(e) {
        showError('Failed to load rooms: ' + e.message);
    }
}

roomSelect.addEventListener('change', () => {
    if (roomSelect.value) {
        history.replaceState(null, '', '?room=' + roomSelect.value);
        selectRoom(roomSelect.value);
    }
});

async function selectRoom(room) {
    currentRoom = room;
    roomLabel.textContent = room;
    updateNavArrows(room);
    renderMinimap();
    oCtx.clearRect(0, 0, objectsCanvas.width, objectsCanvas.height);
    objectsCache = [];
    viewZoomIdx = 0; viewZoom = 1; viewOffsetX = 0; viewOffsetY = 0;
    objectsCanvas.style.cursor = 'crosshair';
    document.getElementById('vz-in').disabled  = false;
    document.getElementById('vz-out').disabled = true;
    if (pollTimer) clearInterval(pollTimer);
    if (statsTimer) clearInterval(statsTimer);

    await loadTerrain(room);
    await tick();
    await fetchStats(room);
    pollTimer = setInterval(tick, 1000);
    statsTimer = setInterval(() => { fetchStats(currentRoom); fetchMapStats(); }, 30000);
}

// ---- Terrain ----
async function loadTerrain(room) {
    terrainCache = null;
    try {
        const res = await fetch(`/visualizer/api/terrain?room=${room}`);
        const data = await res.json();
        if (data.ok && data.terrain) {
            terrainCache = data.terrain;
            renderTerrain(data.terrain);
        }
    } catch(e) {
        showError('Terrain error: ' + e.message);
    }
}

function renderTerrain(encoded) {
    tCtx.clearRect(0, 0, terrainCanvas.width, terrainCanvas.height);
    tCtx.save();
    tCtx.scale(viewZoom, viewZoom);
    tCtx.translate(-viewOffsetX * TILE, -viewOffsetY * TILE);
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            const t = parseInt(encoded[y * SIZE + x]) || 0;
            tCtx.fillStyle = TERRAIN_COLOR[t];
            tCtx.fillRect(x * TILE, y * TILE, TILE, TILE);
        }
    }
    tCtx.restore();
}

// ---- Objects ----
async function tick() {
    if (!currentRoom) return;
    try {
        const res = await fetch(`/visualizer/api/objects?room=${currentRoom}`);
        const data = await res.json();
        if (!data.ok) return;
        objectsCache = data.objects || [];
        if (data.gameTime !== null) tickEl.textContent = data.gameTime;
        renderRoomInfo();
        renderObjects();
        clearError();
    } catch(e) {
        showError('Update error: ' + e.message);
    }
}

// ---- Stats ----
async function fetchStats(room) {
    try {
        const res = await fetch(`/api/game/room-overview?room=${room}&interval=8`);
        const data = await res.json();
        if (!data.ok) { renderStats(null); return; }
        renderStats(data);
    } catch(e) {
        renderStats(null);
    }
}

function fmt(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
}

function renderStats(data) {
    statsOwnerName = data && data.owner ? data.owner.username : null;
    if (!data || !data.owner) {
        statsOwner.innerHTML = '<i style="color:#444">unowned</i>';
        // clear stat rows
        for (const m of STAT_META) {
            const el = document.getElementById('stat-' + m.key);
            if (el) el.remove();
        }
        return;
    }

    const badgeUrl = '/api/user/badge-svg?username=' + encodeURIComponent(data.owner.username);
    const ownerId = mapStatsCache[currentRoom] && mapStatsCache[currentRoom].own && mapStatsCache[currentRoom].own.user;
    const ringColor = ownerId ? userColor(ownerId) : '#555';
    statsOwner.innerHTML = `<span style="display:inline-block;border-radius:50%;border:2px solid ${ringColor};line-height:0;flex-shrink:0"><img class="owner-badge" src="${badgeUrl}" width="32" height="32" onerror="this.parentElement.style.display='none'"></span><b>${data.owner.username}</b>`;

    for (const m of STAT_META) {
        const values = (data.stats[m.key] || []).map(b => b.value);
        const total = data.totals[m.key] || 0;
        const max = Math.max(...values, 1);

        let row = document.getElementById('stat-' + m.key);
        if (!row) {
            row = document.createElement('div');
            row.className = 'stat-row';
            row.id = 'stat-' + m.key;
            statsPanel.appendChild(row);
        }

        const bars = values.map(v => {
            const h = Math.max(2, Math.round((v / max) * 24));
            return `<div class="stat-bar" style="height:${h}px;background:${m.color}88" title="${v}"></div>`;
        }).join('');

        row.innerHTML = `
            <div class="stat-label">${m.label} <span>${fmt(total)}</span></div>
            <div class="stat-bars">${bars}</div>
        `;
    }
}

// ---- Minimap ----
function parseRoomCoord(name) {
    const m = name.match(/^([EW])(\d+)([NS])(\d+)$/);
    if (!m) return {};
    return {
        x: m[1] === 'E' ? parseInt(m[2]) : -(parseInt(m[2]) + 1),
        y: m[3] === 'N' ? parseInt(m[4]) : -(parseInt(m[4]) + 1),
    };
}

function coordToRoom(x, y) {
    const ew = x >= 0 ? ('E' + x) : ('W' + (-(x + 1)));
    const ns = y >= 0 ? ('N' + y) : ('S' + (-(y + 1)));
    return ew + ns;
}

function userColor(userId) {
    let h = 0;
    for (let i = 0; i < userId.length; i++) h = (Math.imul(h, 31) + userId.charCodeAt(i)) | 0;
    return `hsl(${Math.abs(h) % 360}, 65%, 42%)`;
}

function getUserBadge(userId) {
    const u = mapUsersCache[userId];
    if (!u || !u.username) return null;
    const name = u.username;
    if (badgeCache[name] instanceof Image) return badgeCache[name];
    if (badgeCache[name]) return null; // 'loading' or 'error'
    badgeCache[name] = 'loading';
    const img = new Image();
    img.onload = function() { badgeCache[name] = img; if (currentRoom) renderObjects(); };
    img.onerror = function() { badgeCache[name] = 'error'; };
    img.src = '/api/user/badge-svg?username=' + encodeURIComponent(name);
    return null;
}

function getCreepSection(obj) {
    if (!obj.user) return 'npc';
    const roomStat = mapStatsCache[currentRoom];
    const ownerId = roomStat && roomStat.own ? roomStat.own.user : null;
    return (ownerId && obj.user === ownerId) ? 'own' : 'hostile';
}


async function fetchMapStats() {
    if (!allRooms.length) return;
    try {
        const res = await fetch('/api/game/map-stats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rooms: allRooms, statName: 'owner0' }),
        });
        const data = await res.json();
        if (data.ok) {
            mapStatsCache = data.stats || {};
            mapUsersCache = data.users || {};
            renderMinimap();
        }
    } catch(e) {}
}

function renderMinimap() {
    const canvas = document.getElementById('minimap');
    if (!canvas || !allRooms.length) return;

    const coords = allRooms.map(r => ({ name: r, ...parseRoomCoord(r) })).filter(r => r.x !== undefined);
    const xs = coords.map(r => r.x), ys = coords.map(r => r.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    const CELL = 10, GAP = 1, S = CELL + GAP;
    const cols = maxX - minX + 1, rows = maxY - minY + 1;
    canvas.width  = cols * S - GAP;
    canvas.height = rows * S - GAP;
    minimapMeta = { minX, maxY, CELL, GAP };

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const { name, x, y } of coords) {
        const cx = (x - minX) * S;
        const cy = (maxY - y) * S;
        const stat = mapStatsCache[name];
        ctx.fillStyle = (stat && stat.own) ? userColor(stat.own.user) : '#181818';
        ctx.fillRect(cx, cy, CELL, CELL);
        if (name === currentRoom) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(cx + 0.5, cy + 0.5, CELL - 1, CELL - 1);
        }
    }
}

document.getElementById('minimap').addEventListener('click', function(e) {
    if (!minimapMeta) return;
    const { minX, maxY, CELL, GAP } = minimapMeta;
    const S = CELL + GAP;
    const rect = this.getBoundingClientRect();
    const scaleX = this.width / rect.width;
    const scaleY = this.height / rect.height;
    const col = Math.floor((e.clientX - rect.left) * scaleX / S);
    const row = Math.floor((e.clientY - rect.top)  * scaleY / S);
    const x = col + minX, y = maxY - row;
    const name = coordToRoom(x, y);
    if (allRooms.includes(name)) navigateTo(name);
});

// ---- Room Info ----
const BODY_ABBREV = {
    move: 'M', work: 'W', carry: 'C', attack: 'A',
    rangedAttack: 'R', heal: 'H', tough: 'T', claim: 'CL',
};

// Official Screeps part colours, in the order segments are drawn.
const PART_SEGMENT_ORDER = ['attack', 'rangedAttack', 'heal', 'work', 'carry', 'claim', 'tough', 'move'];
const PART_COLOR = {
    attack:       '#ff2020', // red
    rangedAttack: '#2266ff', // blue
    heal:         '#22ff66', // green
    work:         '#ffee00', // yellow
    carry:        '#00ddff', // cyan
    claim:        '#cc22ff', // violet
    tough:        '#ff8800', // orange
    move:         '#cccccc', // light grey
};
const ABBREV_TO_TYPE = {
    A: 'attack', R: 'rangedAttack', H: 'heal', W: 'work',
    C: 'carry', CL: 'claim', T: 'tough', M: 'move',
};

function bodyKey(body) {
    if (!body || !body.length) return '?';
    return body.map(function(p) { return BODY_ABBREV[p.type] || p.type; }).sort().join(' ');
}

// Returns [{type, count, color}] in segment order for a body array.
function bodySegments(body) {
    const counts = {};
    for (const p of (body || [])) {
        const t = p.type || p;
        counts[t] = (counts[t] || 0) + 1;
    }
    return PART_SEGMENT_ORDER.filter(t => counts[t]).map(t => ({ type: t, count: counts[t], color: PART_COLOR[t] }));
}

// Same as bodySegments but parses from a bodyKey string (e.g. "A A M W").
function bodySegmentsFromKey(key) {
    const counts = {};
    for (const abbr of key.split(' ')) {
        const t = ABBREV_TO_TYPE[abbr] || abbr;
        counts[t] = (counts[t] || 0) + 1;
    }
    return PART_SEGMENT_ORDER.filter(t => counts[t]).map(t => ({ type: t, count: counts[t], color: PART_COLOR[t] }));
}

// Draws a segmented-circle sprite onto ctx at (cx, cy) with radius r.
// Each segment is a body part type, sized by count, in PART_SEGMENT_ORDER.
function drawBodySprite(ctx, cx, cy, r, body) {
    const segs = bodySegments(body);
    if (!segs.length) { ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = '#555'; ctx.fill(); return; }
    const total = segs.reduce((s, p) => s + p.count, 0);
    let angle = -Math.PI / 2;
    for (const seg of segs) {
        const sweep = (seg.count / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        // Guard against a full-circle single segment (arc from/to same point is a no-op)
        if (sweep >= Math.PI * 2 - 0.0001) {
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
        } else {
            ctx.arc(cx, cy, r, angle, angle + sweep);
        }
        ctx.closePath();
        ctx.fillStyle = seg.color + 'cc';
        ctx.fill();
        angle += sweep;
    }
}

// Returns an inline SVG of the body sprite for use in the panel legend.
function bodySpriteSVG(key, size) {
    const segs = bodySegmentsFromKey(key);
    const r = size / 2 - 0.5;
    const cx = size / 2, cy = size / 2;
    if (!segs.length) return '<svg width="' + size + '" height="' + size + '"><circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="#555"/></svg>';
    const total = segs.reduce((s, p) => s + p.count, 0);
    let angle = -Math.PI / 2;
    let paths = '';
    for (const seg of segs) {
        const sweep = (seg.count / total) * Math.PI * 2;
        if (sweep >= Math.PI * 2 - 0.0001) {
            paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + seg.color + '"/>';
        } else {
            const x1 = cx + r * Math.cos(angle),          y1 = cy + r * Math.sin(angle);
            const x2 = cx + r * Math.cos(angle + sweep),  y2 = cy + r * Math.sin(angle + sweep);
            const large = sweep > Math.PI ? 1 : 0;
            paths += '<path d="M' + cx + ',' + cy + ' L' + x1.toFixed(2) + ',' + y1.toFixed(2)
                   + ' A' + r + ',' + r + ' 0 ' + large + ',1 ' + x2.toFixed(2) + ',' + y2.toFixed(2)
                   + ' Z" fill="' + seg.color + '"/>';
        }
        angle += sweep;
    }
    paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#00000066" stroke-width="0.5"/>';
    return '<svg width="' + size + '" height="' + size + '" style="vertical-align:middle;flex-shrink:0">' + paths + '</svg>';
}

function renderBodyGroup(section, bodyMap) {
    return Object.keys(bodyMap).sort(function(a, b) { return bodyMap[b] - bodyMap[a]; })
        .map(function(k) {
            const sprite = bodySpriteSVG(k, 14);
            return '<div class="ri-row" data-body-key="' + k + '">' + sprite + '<b>[' + k + ']</b><span>\xd7' + bodyMap[k] + '</span></div>';
        })
        .join('');
}

function renderRoomInfo() {
    const el = document.getElementById('room-info');
    if (!el) return;

    const counts = {};
    let controllerLevel = null;
    let mineralType = null;
    const ownBodies = {}, hostileBodies = {}, npcBodies = {};
    const roomStat = mapStatsCache[currentRoom];
    const ownerId = roomStat && roomStat.own ? roomStat.own.user : null;

    for (const obj of objectsCache) {
        if (obj.type === 'creep' || obj.type === 'powerCreep') {
            const key = bodyKey(obj.body);
            if (!obj.user) {
                npcBodies[key] = (npcBodies[key] || 0) + 1;
            } else if (ownerId && obj.user === ownerId) {
                ownBodies[key] = (ownBodies[key] || 0) + 1;
            } else {
                hostileBodies[key] = (hostileBodies[key] || 0) + 1;
            }
        } else if (obj.type === 'controller') {
            controllerLevel = obj.level !== undefined ? obj.level : null;
        } else if (obj.type === 'mineral' || obj.type === 'deposit') {
            mineralType = obj.mineralType || obj.depositType || '?';
        } else {
            counts[obj.type] = (counts[obj.type] || 0) + 1;
        }
    }

    const STRUCT_ORDER = [
        'spawn','extension','tower','storage','terminal','link',
        'lab','powerSpawn','nuker','observer','extractor',
        'container','rampart','constructedWall','road','constructionSite',
    ];

    const sections = [];

    // Owner / controller
    let ownerLine = statsOwnerName
        ? `<div class="ri-row"><b>owner</b><span>${statsOwnerName}</span></div>`
        : `<div class="ri-row"><b>owner</b><span style="color:#333">—</span></div>`;
    let ctrlLine = controllerLevel !== null
        ? `<div class="ri-row"><b>controller</b><span>lv ${controllerLevel}</span></div>`
        : '';
    sections.push(`<div class="ri-section">${ownerLine}${ctrlLine}</div>`);

    // Structures
    const structRows = STRUCT_ORDER
        .filter(t => counts[t])
        .map(t => `<div class="ri-row"><b>${t}</b><span>×${counts[t]}</span></div>`)
        .join('');
    if (structRows) sections.push(`<div class="ri-section"><div class="ri-heading">structures</div>${structRows}</div>`);

    // Resources
    const srcCount = counts['source'] || 0;
    let resRows = '';
    if (srcCount) resRows += `<div class="ri-row"><b>source</b><span>×${srcCount}</span></div>`;
    if (mineralType) resRows += `<div class="ri-row"><b>mineral</b><span>${mineralType}</span></div>`;
    if (resRows) sections.push(`<div class="ri-section"><div class="ri-heading">resources</div>${resRows}</div>`);

    // Creeps
    if (Object.keys(ownBodies).length)
        sections.push('<div class="ri-section"><div class="ri-heading">creeps — own</div>' + renderBodyGroup('own', ownBodies) + '</div>');
    if (Object.keys(hostileBodies).length)
        sections.push('<div class="ri-section"><div class="ri-heading" style="color:#884444">creeps — hostile</div>' + renderBodyGroup('hostile', hostileBodies) + '</div>');
    if (Object.keys(npcBodies).length)
        sections.push('<div class="ri-section"><div class="ri-heading">creeps — npc</div>' + renderBodyGroup('npc', npcBodies) + '</div>');

    el.innerHTML = sections.join('');
}

// ---- Render Objects ----
function renderObjects() {
    oCtx.clearRect(0, 0, objectsCanvas.width, objectsCanvas.height);

    const sorted = [...objectsCache].sort((a, b) => {
        const order = { road: 0, constructionSite: 1, rampart: 2 };
        const ao = order[a.type] !== undefined ? order[a.type] : 3;
        const bo = order[b.type] !== undefined ? order[b.type] : 3;
        return ao - bo;
    });

    oCtx.save();
    oCtx.scale(viewZoom, viewZoom);
    oCtx.translate(-viewOffsetX * TILE, -viewOffsetY * TILE);
    for (const obj of sorted) {
        drawObject(obj);
    }
    oCtx.restore();
}

function drawObject(obj) {
    const px = obj.x * TILE;
    const py = obj.y * TILE;
    const cx = px + TILE / 2;
    const cy = py + TILE / 2;

    if (obj.type === 'creep' || obj.type === 'powerCreep') {
        const color = creepColor(obj);
        const r = TILE / 2 - 1;

        // Draw the body-composition sprite — unique per body composition.
        drawBodySprite(oCtx, cx, cy, r, obj.body);

        // Coloured ring identifies ownership (own=green, hostile=red, npc=orange).
        oCtx.beginPath();
        oCtx.arc(cx, cy, r, 0, Math.PI * 2);
        oCtx.strokeStyle = color;
        oCtx.lineWidth = 1.5;
        oCtx.stroke();
        return;
    }

    if (obj.type === 'source') {
        // Yellow diamond
        oCtx.beginPath();
        oCtx.moveTo(cx, py + 1);
        oCtx.lineTo(px + TILE - 1, cy);
        oCtx.lineTo(cx, py + TILE - 1);
        oCtx.lineTo(px + 1, cy);
        oCtx.closePath();
        oCtx.fillStyle = '#ffdd00';
        oCtx.fill();
        return;
    }

    if (obj.type === 'mineral' || obj.type === 'deposit') {
        oCtx.beginPath();
        oCtx.arc(cx, cy, TILE / 2 - 2, 0, Math.PI * 2);
        oCtx.fillStyle = '#ff88ff';
        oCtx.fill();
        return;
    }

    if (obj.type === 'controller') {
        oCtx.beginPath();
        oCtx.arc(cx, cy, TILE / 2 - 1, 0, Math.PI * 2);
        oCtx.fillStyle = '#8800cc88';
        oCtx.fill();
        oCtx.strokeStyle = '#aa44ff';
        oCtx.lineWidth = 1.5;
        oCtx.stroke();
        return;
    }

    if (obj.type === 'road') {
        oCtx.beginPath();
        oCtx.arc(cx, cy, 2, 0, Math.PI * 2);
        oCtx.fillStyle = '#555';
        oCtx.fill();
        return;
    }

    if (obj.type === 'constructionSite') {
        oCtx.strokeStyle = 'rgba(255,255,255,0.35)';
        oCtx.lineWidth = 1;
        oCtx.setLineDash([2, 2]);
        oCtx.strokeRect(px + 1.5, py + 1.5, TILE - 3, TILE - 3);
        oCtx.setLineDash([]);
        return;
    }

    const struct = STRUCT[obj.type];
    if (!struct) return;

    const pad = (TILE - struct.size) / 2;
    oCtx.globalAlpha = struct.alpha || 1;
    oCtx.fillStyle = struct.color;
    oCtx.fillRect(px + pad, py + pad, struct.size, struct.size);
    oCtx.strokeStyle = lighten(struct.color, 40);
    oCtx.lineWidth = 1;
    oCtx.strokeRect(px + pad, py + pad, struct.size, struct.size);
    oCtx.globalAlpha = 1;
}

function creepColor(obj) {
    if (!obj.user) return CREEP_COLORS.npc;
    return userColor(obj.user);
}

function lighten(hex, amount) {
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, (n >> 16) + amount);
    const g = Math.min(255, ((n >> 8) & 0xff) + amount);
    const b = Math.min(255, (n & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
}

// ---- Tooltip + Pan ----
objectsCanvas.addEventListener('mousedown', function(e) {
    if (viewZoom > 1) {
        isPanning = true;
        panStartX = e.clientX; panStartY = e.clientY;
        panBaseX = viewOffsetX; panBaseY = viewOffsetY;
        objectsCanvas.style.cursor = 'grabbing';
    }
});
objectsCanvas.addEventListener('mouseup',    function() { isPanning = false; objectsCanvas.style.cursor = viewZoom > 1 ? 'grab' : 'crosshair'; });
objectsCanvas.addEventListener('mouseleave', function() { isPanning = false; tooltip.style.display = 'none'; });

objectsCanvas.addEventListener('mousemove', function(e) {
    const rect = objectsCanvas.getBoundingClientRect();
    const scale = objectsCanvas.width / rect.width;

    if (isPanning) {
        const dx = (e.clientX - panStartX) * scale / (TILE * viewZoom);
        const dy = (e.clientY - panStartY) * scale / (TILE * viewZoom);
        viewOffsetX = panBaseX - dx;
        viewOffsetY = panBaseY - dy;
        clampViewOffset();
        if (terrainCache) renderTerrain(terrainCache);
        renderObjects();
        tooltip.style.display = 'none';
        return;
    }

    const mx = (e.clientX - rect.left) * scale;
    const my = (e.clientY - rect.top)  * scale;
    const tx = Math.floor(mx / (TILE * viewZoom) + viewOffsetX);
    const ty = Math.floor(my / (TILE * viewZoom) + viewOffsetY);
    const objs = objectsCache.filter(o => o.x === tx && o.y === ty);

    if (objs.length) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 8)  + 'px';
        tooltip.innerHTML = objs.map(tooltipHtml).join('<hr>');
    } else {
        tooltip.style.display = 'none';
    }
});

function tooltipHtml(obj) {
    const lines = [`<b>${obj.type}</b>`];
    if (obj.name)         lines.push(`name: ${obj.name}`);
    if (obj.user)         lines.push(`user: ${(mapUsersCache[obj.user] && mapUsersCache[obj.user].username) || obj.user}`);
    if (obj.hits !== undefined && obj.hitsMax)
                          lines.push(`hits: ${obj.hits} / ${obj.hitsMax}`);
    if (obj.energy !== undefined && obj.energyCapacity !== undefined)
                          lines.push(`energy: ${obj.energy} / ${obj.energyCapacity}`);
    if (obj.store)        lines.push(`store: ${JSON.stringify(obj.store)}`);
    if (obj.ticksToLive)  lines.push(`ttl: ${obj.ticksToLive}`);
    if (obj.mineralType)  lines.push(`mineral: ${obj.mineralType}`);
    if (obj.level !== undefined)
                          lines.push(`level: ${obj.level}`);
    return lines.join('<br>');
}

// ---- WASD Pan ----
document.addEventListener('keydown', function(e) {
    if (viewZoom <= 1) return;
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    const step = SIZE / viewZoom / 4; // pan 1/4 of visible area
    let dx = 0, dy = 0;
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft')  dx = -step;
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') dx =  step;
    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')    dy = -step;
    if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown')  dy =  step;
    if (!dx && !dy) return;
    e.preventDefault();
    viewOffsetX += dx;
    viewOffsetY += dy;
    clampViewOffset();
    if (terrainCache) renderTerrain(terrainCache);
    renderObjects();
});

// ---- Error ----
function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
}
function clearError() {
    errorEl.style.display = 'none';
}

// ---- Body-composition tooltip ----
(function () {
    const tt = document.getElementById('body-tooltip');

    document.getElementById('room-info').addEventListener('mousemove', function (e) {
        const row = e.target.closest('[data-body-key]');
        if (!row) { tt.style.display = 'none'; return; }

        const key = row.dataset.bodyKey;
        const segs = bodySegmentsFromKey(key);
        const legend = segs.map(function (s) {
            return '<div style="display:flex;align-items:center;gap:5px;margin:2px 0">'
                + '<span style="width:10px;height:10px;border-radius:2px;background:' + s.color + ';flex-shrink:0"></span>'
                + '<span style="color:#ccc;font:11px monospace">' + s.type + ' \xd7' + s.count + '</span>'
                + '</div>';
        }).join('');
        tt.innerHTML = bodySpriteSVG(key, 72) + '<div style="margin-top:6px">' + legend + '</div>';
        tt.style.display = 'block';

        // Position to the left of the panel, avoiding viewport edges.
        const ttw = 88, tth = 88;
        let tx = e.clientX - ttw - 8;
        let ty = e.clientY - tth / 2;
        if (tx < 4) tx = e.clientX + 8;
        if (ty + tth > window.innerHeight - 4) ty = window.innerHeight - tth - 4;
        if (ty < 4) ty = 4;
        tt.style.left = tx + 'px';
        tt.style.top  = ty + 'px';
    });

    document.getElementById('room-info').addEventListener('mouseleave', function () {
        tt.style.display = 'none';
    });
}());

// ---- Console Panel ----
(function() {
    const consoleBody   = document.getElementById('console-body');
    const consoleClear  = document.getElementById('console-clear');
    const consoleToggle = document.getElementById('console-toggle');
    const consoleStatus = document.getElementById('console-status');
    const consolePanel  = document.getElementById('console-panel');
    let collapsed = false;
    let es = null;

    function fmtTime(ts) {
        const d = new Date(ts);
        return d.toTimeString().slice(0, 8);
    }

    function appendLine(msg) {
        const atBottom = consoleBody.scrollHeight - consoleBody.scrollTop <= consoleBody.clientHeight + 4;
        const row = document.createElement('div');
        row.className = 'con-line' + (msg.type === 'error' ? ' con-err' : '');
        const t = document.createElement('span');
        t.className = 'con-ts';
        t.textContent = fmtTime(msg.ts);
        const m = document.createElement('span');
        m.className = 'con-msg';
        m.textContent = msg.text;
        row.append(t, m);
        consoleBody.appendChild(row);
        // Trim to 500 lines
        while (consoleBody.children.length > 500) consoleBody.removeChild(consoleBody.firstChild);
        if (atBottom) consoleBody.scrollTop = consoleBody.scrollHeight;
    }

    function connect() {
        if (es) es.close();
        consoleStatus.textContent = 'connecting...';
        es = new EventSource('/visualizer/api/console-log');
        es.onopen = function() { consoleStatus.textContent = ''; };
        es.onmessage = function(e) {
            try { appendLine(JSON.parse(e.data)); } catch(err) {}
        };
        es.onerror = function() {
            consoleStatus.textContent = 'disconnected';
            es.close();
            setTimeout(connect, 5000);
        };
    }

    consoleClear.addEventListener('click', function() {
        consoleBody.innerHTML = '';
    });

    consoleToggle.addEventListener('click', function() {
        collapsed = !collapsed;
        consolePanel.classList.toggle('collapsed', collapsed);
        consoleToggle.textContent = collapsed ? '▲' : '▼';
    });

    connect();
}());

// Start
applyZoom(TILE);
init();
</script>

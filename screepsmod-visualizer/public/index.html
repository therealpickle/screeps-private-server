<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screeps Visualizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0a0a0a;
    color: #ccc;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
}
#header h1 {
    font-size: 0.85rem;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
}
select {
    background: #1a1a1a;
    color: #ccc;
    border: 1px solid #333;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
}
select:focus { border-color: #555; }
#status {
    margin-left: auto;
    font-size: 0.75rem;
    color: #444;
}
#status span { color: #666; }
#canvas-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: auto;
    padding: 16px;
    gap: 20px;
}
#left-col {
    grid-column: 1;
    grid-row: 1 / -1;
    width: 160px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-right: 16px;
    overflow-y: auto;
}
#room-info {
    display: flex;
    flex-direction: column;
    gap: 0;
    font-size: 0.7rem;
}
#minimap-wrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
}
#minimap-label {
    font-size: 0.6rem;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#minimap {
    cursor: pointer;
    display: block;
    max-width: 160px;
}
.ri-section {
    border-bottom: 1px solid #1a1a1a;
    padding: 6px 0 8px;
}
.ri-section:first-child { padding-top: 0; }
.ri-heading {
    color: #444;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.6rem;
    margin-bottom: 5px;
}
.ri-row {
    display: flex;
    justify-content: space-between;
    color: #555;
    padding: 1px 0;
}
.ri-row b { color: #888; font-weight: normal; }
.ri-row span { color: #666; }
#map-wrap {
    display: grid;
    grid-template-columns: 160px auto 600px auto;
    grid-template-rows: auto 600px auto;
    flex-shrink: 0;
}
#layers {
    grid-column: 3;
    grid-row: 2;
    position: relative;
    width: 600px;
    height: 600px;
}
.nav-arrow {
    background: #0d0d0d;
    border: 1px solid #222;
    color: #383838;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 4px 10px;
    line-height: 1.4;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
}
.nav-arrow:hover:not(:disabled) { color: #aaa; border-color: #555; }
.nav-arrow:disabled { color: #181818; border-color: #141414; cursor: default; }
#nav-N { grid-column: 3; grid-row: 1; justify-self: stretch; align-self: end;    margin-bottom: 4px; }
#nav-S { grid-column: 3; grid-row: 3; justify-self: stretch; align-self: start;  margin-top: 4px; }
#nav-W { grid-column: 2; grid-row: 2; justify-self: end;     align-self: stretch; margin-right: 4px; }
#nav-E { grid-column: 4; grid-row: 2; justify-self: start;   align-self: stretch; margin-left: 4px; }
#layers canvas {
    position: absolute;
    top: 0; left: 0;
    image-rendering: pixelated;
}
#objects-canvas { cursor: crosshair; }
#stats-panel {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
#stats-owner {
    font-size: 0.75rem;
    color: #888;
    border-bottom: 1px solid #222;
    padding-bottom: 8px;
}
#stats-owner b { color: #aaa; }
.stat-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
}
.stat-label {
    font-size: 0.65rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
}
.stat-label span { color: #777; }
.stat-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 24px;
}
.stat-bar {
    flex: 1;
    background: #1e3a1e;
    min-height: 2px;
}
#tooltip {
    position: fixed;
    background: #161616;
    border: 1px solid #333;
    padding: 8px 10px;
    font-size: 0.72rem;
    line-height: 1.6;
    pointer-events: none;
    display: none;
    max-width: 220px;
    z-index: 100;
    color: #aaa;
}
#tooltip b { color: #eee; }
#tooltip hr { border: none; border-top: 1px solid #333; margin: 4px 0; }
#error {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #300;
    border: 1px solid #600;
    color: #f88;
    padding: 6px 14px;
    font-size: 0.75rem;
    display: none;
}
</style>
</head>
<body>

<div id="header">
    <h1>Screeps Visualizer</h1>
    <select id="room-select"><option value="">loading rooms...</option></select>
    <div id="status">tick: <span id="tick">--</span> &nbsp; room: <span id="room-label">--</span></div>
</div>

<div id="canvas-wrap">
    <div id="map-wrap">
        <div id="left-col">
            <div id="minimap-wrap">
                <div id="minimap-label">world</div>
                <canvas id="minimap" width="1" height="1"></canvas>
            </div>
            <div id="room-info"></div>
        </div>
        <button class="nav-arrow" id="nav-N" disabled>▲</button>
        <button class="nav-arrow" id="nav-S" disabled>▼</button>
        <button class="nav-arrow" id="nav-W" disabled>◀</button>
        <button class="nav-arrow" id="nav-E" disabled>▶</button>
        <div id="layers">
            <canvas id="terrain-canvas" width="600" height="600"></canvas>
            <canvas id="objects-canvas" width="600" height="600"></canvas>
        </div>
    </div>
    <div id="stats-panel">
        <div id="stats-owner">no owner</div>
    </div>
</div>

<div id="tooltip"></div>
<div id="error"></div>

<script>
const TILE = 12;
const SIZE = 50;

const terrainCanvas = document.getElementById('terrain-canvas');
const objectsCanvas = document.getElementById('objects-canvas');
const tCtx = terrainCanvas.getContext('2d');
const oCtx = objectsCanvas.getContext('2d');
const roomSelect = document.getElementById('room-select');
const tickEl = document.getElementById('tick');
const roomLabel = document.getElementById('room-label');
const tooltip = document.getElementById('tooltip');
const errorEl = document.getElementById('error');
const statsPanel = document.getElementById('stats-panel');
const statsOwner = document.getElementById('stats-owner');

// ---- Colors ----

const TERRAIN_COLOR = [
    '#141414',  // 0: plain
    '#2b2b2b',  // 1: wall
    '#0d1a0d',  // 2: swamp
    '#2b2b2b',  // 3: wall+swamp (treat as wall)
];

const STRUCT = {
    spawn:          { color: '#00ccff', size: 10 },
    extension:      { color: '#0077bb', size: 7  },
    tower:          { color: '#cc3333', size: 9  },
    storage:        { color: '#cc8800', size: 10 },
    container:      { color: '#886633', size: 8  },
    link:           { color: '#008888', size: 7  },
    lab:            { color: '#880088', size: 9  },
    terminal:       { color: '#888800', size: 10 },
    nuker:          { color: '#cc0000', size: 10 },
    observer:       { color: '#446644', size: 6  },
    powerSpawn:     { color: '#cc4400', size: 10 },
    extractor:      { color: '#884488', size: 9  },
    constructedWall:{ color: '#444444', size: 11 },
    rampart:        { color: '#006600', size: 11, alpha: 0.4 },
    road:           null,
};

const CREEP_COLORS = {
    own:     '#00ff88',
    hostile: '#ff4444',
    npc:     '#ffaa00',
};

const STAT_META = [
    { key: 'energyHarvested',   label: 'harvested',    color: '#4a8a4a' },
    { key: 'energyControl',     label: 'upgraded',     color: '#6644aa' },
    { key: 'energyCreeps',      label: 'spawned',      color: '#2266aa' },
    { key: 'energyConstruction',label: 'built',        color: '#886633' },
    { key: 'creepsProduced',    label: 'creeps born',  color: '#448844' },
    { key: 'creepsLost',        label: 'creeps lost',  color: '#884444' },
];

// ---- State ----
let currentRoom = null;
let pollTimer = null;
let statsTimer = null;
let objectsCache = [];
let allRooms = [];
let statsOwnerName = null;
let mapStatsCache = {};
let mapUsersCache = {};
let minimapMeta = null; // { minX, maxY, CELL, GAP }

// ---- Navigation ----
const NAV_DIRS = { N: 'N', S: 'S', E: 'E', W: 'W' };

function adjacentRoom(name, dir) {
    const m = name.match(/^([EW])(\d+)([NS])(\d+)$/);
    if (!m) return null;
    let ew = m[1], ex = parseInt(m[2]), ns = m[3], ny = parseInt(m[4]);
    switch (dir) {
        case 'N':
            if (ns === 'N') ny++;
            else if (ny > 0) ny--;
            else { ns = 'N'; ny = 0; }
            break;
        case 'S':
            if (ns === 'S') ny++;
            else if (ny > 0) ny--;
            else { ns = 'S'; ny = 0; }
            break;
        case 'E':
            if (ew === 'E') ex++;
            else if (ex > 0) ex--;
            else { ew = 'E'; ex = 0; }
            break;
        case 'W':
            if (ew === 'W') ex++;
            else if (ex > 0) ex--;
            else { ew = 'W'; ex = 0; }
            break;
    }
    return `${ew}${ex}${ns}${ny}`;
}

function updateNavArrows(room) {
    for (const dir of ['N', 'S', 'E', 'W']) {
        const btn = document.getElementById('nav-' + dir);
        const neighbor = adjacentRoom(room, dir);
        const exists = neighbor && allRooms.includes(neighbor);
        btn.disabled = !exists;
        btn.title = exists ? neighbor : '';
        btn.onclick = exists ? () => navigateTo(neighbor) : null;
    }
}

function navigateTo(room) {
    roomSelect.value = room;
    history.replaceState(null, '', '?room=' + room);
    selectRoom(room);
}

// ---- Init ----
async function init() {
    try {
        const res = await fetch('/visualizer/api/rooms');
        const data = await res.json();
        if (!data.ok || !data.rooms.length) {
            showError('No rooms found');
            return;
        }
        allRooms = data.rooms;
        roomSelect.innerHTML = data.rooms.map(r =>
            `<option value="${r}">${r}</option>`
        ).join('');
        const initial = new URLSearchParams(location.search).get('room');
        const room = (initial && data.rooms.includes(initial)) ? initial : data.rooms[0];
        roomSelect.value = room;
        await fetchMapStats();
        selectRoom(room);
    } catch(e) {
        showError('Failed to load rooms: ' + e.message);
    }
}

roomSelect.addEventListener('change', () => {
    if (roomSelect.value) {
        history.replaceState(null, '', '?room=' + roomSelect.value);
        selectRoom(roomSelect.value);
    }
});

async function selectRoom(room) {
    currentRoom = room;
    roomLabel.textContent = room;
    updateNavArrows(room);
    renderMinimap();
    oCtx.clearRect(0, 0, 600, 600);
    objectsCache = [];
    if (pollTimer) clearInterval(pollTimer);
    if (statsTimer) clearInterval(statsTimer);

    await loadTerrain(room);
    await tick();
    await fetchStats(room);
    pollTimer = setInterval(tick, 1000);
    statsTimer = setInterval(() => { fetchStats(currentRoom); fetchMapStats(); }, 30000);
}

// ---- Terrain ----
async function loadTerrain(room) {
    try {
        const res = await fetch(`/visualizer/api/terrain?room=${room}`);
        const data = await res.json();
        if (data.ok && data.terrain) {
            renderTerrain(data.terrain);
        }
    } catch(e) {
        showError('Terrain error: ' + e.message);
    }
}

function renderTerrain(encoded) {
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            const t = parseInt(encoded[y * SIZE + x]) || 0;
            tCtx.fillStyle = TERRAIN_COLOR[t];
            tCtx.fillRect(x * TILE, y * TILE, TILE, TILE);
        }
    }
}

// ---- Objects ----
async function tick() {
    if (!currentRoom) return;
    try {
        const res = await fetch(`/visualizer/api/objects?room=${currentRoom}`);
        const data = await res.json();
        if (!data.ok) return;
        objectsCache = data.objects || [];
        if (data.gameTime !== null) tickEl.textContent = data.gameTime;
        renderObjects();
        renderRoomInfo();
        clearError();
    } catch(e) {
        showError('Update error: ' + e.message);
    }
}

// ---- Stats ----
async function fetchStats(room) {
    try {
        const res = await fetch(`/api/game/room-overview?room=${room}&interval=8`);
        const data = await res.json();
        if (!data.ok) { renderStats(null); return; }
        renderStats(data);
    } catch(e) {
        renderStats(null);
    }
}

function fmt(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
}

function renderStats(data) {
    statsOwnerName = data && data.owner ? data.owner.username : null;
    if (!data || !data.owner) {
        statsOwner.innerHTML = '<i style="color:#444">unowned</i>';
        // clear stat rows
        for (const m of STAT_META) {
            const el = document.getElementById('stat-' + m.key);
            if (el) el.remove();
        }
        return;
    }

    statsOwner.innerHTML = `<b>${data.owner.username}</b>`;

    for (const m of STAT_META) {
        const values = (data.stats[m.key] || []).map(b => b.value);
        const total = data.totals[m.key] || 0;
        const max = Math.max(...values, 1);

        let row = document.getElementById('stat-' + m.key);
        if (!row) {
            row = document.createElement('div');
            row.className = 'stat-row';
            row.id = 'stat-' + m.key;
            statsPanel.appendChild(row);
        }

        const bars = values.map(v => {
            const h = Math.max(2, Math.round((v / max) * 24));
            return `<div class="stat-bar" style="height:${h}px;background:${m.color}88" title="${v}"></div>`;
        }).join('');

        row.innerHTML = `
            <div class="stat-label">${m.label} <span>${fmt(total)}</span></div>
            <div class="stat-bars">${bars}</div>
        `;
    }
}

// ---- Minimap ----
function parseRoomCoord(name) {
    const m = name.match(/^([EW])(\d+)([NS])(\d+)$/);
    if (!m) return null;
    return {
        x: parseInt(m[2]) * (m[1] === 'W' ? -1 : 1),
        y: parseInt(m[4]) * (m[3] === 'N' ? 1 : -1),
    };
}

function coordToRoom(x, y) {
    const ew = x < 0 ? 'W' : 'E';
    const ns = y < 0 ? 'S' : 'N';
    return `${ew}${Math.abs(x)}${ns}${Math.abs(y)}`;
}

function userColor(userId) {
    let h = 0;
    for (let i = 0; i < userId.length; i++) h = (Math.imul(h, 31) + userId.charCodeAt(i)) | 0;
    return `hsl(${Math.abs(h) % 360}, 65%, 42%)`;
}

async function fetchMapStats() {
    if (!allRooms.length) return;
    try {
        const res = await fetch('/api/game/map-stats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rooms: allRooms, statName: 'owner0' }),
        });
        const data = await res.json();
        if (data.ok) {
            mapStatsCache = data.stats || {};
            mapUsersCache = data.users || {};
            renderMinimap();
        }
    } catch(e) {}
}

function renderMinimap() {
    const canvas = document.getElementById('minimap');
    if (!canvas || !allRooms.length) return;

    const coords = allRooms.map(r => ({ name: r, ...parseRoomCoord(r) })).filter(r => r.x !== undefined);
    const xs = coords.map(r => r.x), ys = coords.map(r => r.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    const CELL = 10, GAP = 1, S = CELL + GAP;
    const cols = maxX - minX + 1, rows = maxY - minY + 1;
    canvas.width  = cols * S - GAP;
    canvas.height = rows * S - GAP;
    minimapMeta = { minX, maxY, CELL, GAP };

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const { name, x, y } of coords) {
        const cx = (x - minX) * S;
        const cy = (maxY - y) * S;
        const stat = mapStatsCache[name];
        ctx.fillStyle = (stat && stat.own) ? userColor(stat.own.user) : '#181818';
        ctx.fillRect(cx, cy, CELL, CELL);
        if (name === currentRoom) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(cx + 0.5, cy + 0.5, CELL - 1, CELL - 1);
        }
    }
}

document.getElementById('minimap').addEventListener('click', function(e) {
    if (!minimapMeta) return;
    const { minX, maxY, CELL, GAP } = minimapMeta;
    const S = CELL + GAP;
    const rect = this.getBoundingClientRect();
    const col = Math.floor((e.clientX - rect.left) / S);
    const row = Math.floor((e.clientY - rect.top)  / S);
    const x = col + minX, y = maxY - row;
    const name = coordToRoom(x, y);
    if (allRooms.includes(name)) navigateTo(name);
});

// ---- Room Info ----
function renderRoomInfo() {
    const el = document.getElementById('room-info');
    if (!el) return;

    const counts = {};
    let controllerLevel = null;
    let mineralType = null;
    let ownCreeps = 0, hostileCreeps = 0, npcCreeps = 0;

    for (const obj of objectsCache) {
        if (obj.type === 'creep' || obj.type === 'powerCreep') {
            if (!obj.user) npcCreeps++;
            else ownCreeps++;
        } else if (obj.type === 'controller') {
            controllerLevel = obj.level !== undefined ? obj.level : null;
        } else if (obj.type === 'mineral' || obj.type === 'deposit') {
            mineralType = obj.mineralType || obj.depositType || '?';
        } else {
            counts[obj.type] = (counts[obj.type] || 0) + 1;
        }
    }

    const STRUCT_ORDER = [
        'spawn','extension','tower','storage','terminal','link',
        'lab','powerSpawn','nuker','observer','extractor',
        'container','rampart','constructedWall','road','constructionSite',
    ];

    const sections = [];

    // Owner / controller
    let ownerLine = statsOwnerName
        ? `<div class="ri-row"><b>owner</b><span>${statsOwnerName}</span></div>`
        : `<div class="ri-row"><b>owner</b><span style="color:#333">—</span></div>`;
    let ctrlLine = controllerLevel !== null
        ? `<div class="ri-row"><b>controller</b><span>lv ${controllerLevel}</span></div>`
        : '';
    sections.push(`<div class="ri-section">${ownerLine}${ctrlLine}</div>`);

    // Structures
    const structRows = STRUCT_ORDER
        .filter(t => counts[t])
        .map(t => `<div class="ri-row"><b>${t}</b><span>×${counts[t]}</span></div>`)
        .join('');
    if (structRows) sections.push(`<div class="ri-section"><div class="ri-heading">structures</div>${structRows}</div>`);

    // Resources
    const srcCount = counts['source'] || 0;
    let resRows = '';
    if (srcCount) resRows += `<div class="ri-row"><b>source</b><span>×${srcCount}</span></div>`;
    if (mineralType) resRows += `<div class="ri-row"><b>mineral</b><span>${mineralType}</span></div>`;
    if (resRows) sections.push(`<div class="ri-section"><div class="ri-heading">resources</div>${resRows}</div>`);

    // Creeps
    let creepRows = '';
    if (ownCreeps)     creepRows += `<div class="ri-row"><b>own</b><span>×${ownCreeps}</span></div>`;
    if (hostileCreeps) creepRows += `<div class="ri-row"><b style="color:#884444">hostile</b><span>×${hostileCreeps}</span></div>`;
    if (npcCreeps)     creepRows += `<div class="ri-row"><b>npc</b><span>×${npcCreeps}</span></div>`;
    if (creepRows) sections.push(`<div class="ri-section"><div class="ri-heading">creeps</div>${creepRows}</div>`);

    el.innerHTML = sections.join('');
}

// ---- Render Objects ----
function renderObjects() {
    oCtx.clearRect(0, 0, 600, 600);

    // Sort: roads first, then structures, then creeps on top
    const sorted = [...objectsCache].sort((a, b) => {
        const order = { road: 0, constructionSite: 1, rampart: 2 };
        const ao = order[a.type] !== undefined ? order[a.type] : 3;
        const bo = order[b.type] !== undefined ? order[b.type] : 3;
        return ao - bo;
    });

    for (const obj of sorted) {
        drawObject(obj);
    }
}

function drawObject(obj) {
    const px = obj.x * TILE;
    const py = obj.y * TILE;
    const cx = px + TILE / 2;
    const cy = py + TILE / 2;

    if (obj.type === 'creep' || obj.type === 'powerCreep') {
        const color = creepColor(obj);
        oCtx.beginPath();
        oCtx.arc(cx, cy, TILE / 2 - 1, 0, Math.PI * 2);
        oCtx.fillStyle = color + '99';
        oCtx.fill();
        oCtx.strokeStyle = color;
        oCtx.lineWidth = 1.5;
        oCtx.stroke();
        return;
    }

    if (obj.type === 'source') {
        // Yellow diamond
        oCtx.beginPath();
        oCtx.moveTo(cx, py + 1);
        oCtx.lineTo(px + TILE - 1, cy);
        oCtx.lineTo(cx, py + TILE - 1);
        oCtx.lineTo(px + 1, cy);
        oCtx.closePath();
        oCtx.fillStyle = '#ffdd00';
        oCtx.fill();
        return;
    }

    if (obj.type === 'mineral' || obj.type === 'deposit') {
        oCtx.beginPath();
        oCtx.arc(cx, cy, TILE / 2 - 2, 0, Math.PI * 2);
        oCtx.fillStyle = '#ff88ff';
        oCtx.fill();
        return;
    }

    if (obj.type === 'controller') {
        oCtx.beginPath();
        oCtx.arc(cx, cy, TILE / 2 - 1, 0, Math.PI * 2);
        oCtx.fillStyle = '#8800cc88';
        oCtx.fill();
        oCtx.strokeStyle = '#aa44ff';
        oCtx.lineWidth = 1.5;
        oCtx.stroke();
        return;
    }

    if (obj.type === 'road') {
        oCtx.beginPath();
        oCtx.arc(cx, cy, 2, 0, Math.PI * 2);
        oCtx.fillStyle = '#555';
        oCtx.fill();
        return;
    }

    if (obj.type === 'constructionSite') {
        oCtx.strokeStyle = 'rgba(255,255,255,0.35)';
        oCtx.lineWidth = 1;
        oCtx.setLineDash([2, 2]);
        oCtx.strokeRect(px + 1.5, py + 1.5, TILE - 3, TILE - 3);
        oCtx.setLineDash([]);
        return;
    }

    const struct = STRUCT[obj.type];
    if (!struct) return;

    const pad = (TILE - struct.size) / 2;
    oCtx.globalAlpha = struct.alpha || 1;
    oCtx.fillStyle = struct.color;
    oCtx.fillRect(px + pad, py + pad, struct.size, struct.size);
    oCtx.strokeStyle = lighten(struct.color, 40);
    oCtx.lineWidth = 1;
    oCtx.strokeRect(px + pad, py + pad, struct.size, struct.size);
    oCtx.globalAlpha = 1;
}

function creepColor(obj) {
    if (!obj.user) return CREEP_COLORS.npc;
    return CREEP_COLORS.own;
}

function lighten(hex, amount) {
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, (n >> 16) + amount);
    const g = Math.min(255, ((n >> 8) & 0xff) + amount);
    const b = Math.min(255, (n & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
}

// ---- Tooltip ----
objectsCanvas.addEventListener('mousemove', function(e) {
    const rect = objectsCanvas.getBoundingClientRect();
    const tx = Math.floor((e.clientX - rect.left) / TILE);
    const ty = Math.floor((e.clientY - rect.top) / TILE);
    const objs = objectsCache.filter(o => o.x === tx && o.y === ty);

    if (objs.length) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 8)  + 'px';
        tooltip.innerHTML = objs.map(tooltipHtml).join('<hr>');
    } else {
        tooltip.style.display = 'none';
    }
});
objectsCanvas.addEventListener('mouseleave', () => tooltip.style.display = 'none');

function tooltipHtml(obj) {
    const lines = [`<b>${obj.type}</b>`];
    if (obj.name)         lines.push(`name: ${obj.name}`);
    if (obj.user)         lines.push(`user: ${obj.user}`);
    if (obj.hits !== undefined && obj.hitsMax)
                          lines.push(`hits: ${obj.hits} / ${obj.hitsMax}`);
    if (obj.energy !== undefined && obj.energyCapacity !== undefined)
                          lines.push(`energy: ${obj.energy} / ${obj.energyCapacity}`);
    if (obj.store)        lines.push(`store: ${JSON.stringify(obj.store)}`);
    if (obj.ticksToLive)  lines.push(`ttl: ${obj.ticksToLive}`);
    if (obj.mineralType)  lines.push(`mineral: ${obj.mineralType}`);
    if (obj.level !== undefined)
                          lines.push(`level: ${obj.level}`);
    return lines.join('<br>');
}

// ---- Error ----
function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
}
function clearError() {
    errorEl.style.display = 'none';
}

// Start
init();
</script>
